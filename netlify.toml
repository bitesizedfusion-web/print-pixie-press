[build]
  command = "bun run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "22"
  NETLIFY_USE_BUN = "true"

[[headers]]
  for = "/_build/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"